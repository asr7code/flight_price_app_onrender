<!DOCTYPE html>
<html>
<head>
    <title>Flight Price Predictor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <div class="container">
        <h1>✈️ Flight Price Predictor</h1>

        <form action="/predict" method="post">
            <input type="number" name="Airline" placeholder="Airline" required>
            <input type="number" name="Source" placeholder="Source" required>
            <input type="number" name="Destination" placeholder="Destination" required>
            <input type="number" name="Total_Stops" placeholder="Total Stops" required>
            <input type="number" name="Journey_Day" placeholder="Journey Day" required>
            <input type="number" name="Journey_Month" placeholder="Journey Month" required>
            <input type="number" name="Dep_Hour" placeholder="Departure Hour" required>
            <input type="number" name="Dep_Min" placeholder="Departure Minute" required>
            <input type="number" name="Arrival_Hour" placeholder="Arrival Hour" required>
            <input type="number" name="Arrival_Min" placeholder="Arrival Minute" required>
            <input type="number" name="Duration_Hours" placeholder="Duration Hours" required>
            <input type="number" name="Duration_Min" placeholder="Duration Minutes" required>
            <input type="number" name="Additional_Info" placeholder="Additional Info" required>

            <button type="submit">Predict</button>
        </form>

        <h2>{{ prediction_text }}</h2>
    </div>
</body>
</html>
